<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BS Konfigurátor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a0f;color:#fff;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.logo{font-size:16px;font-weight:700;letter-spacing:2px;color:#e8c87a}
.logo span{color:#fff;font-weight:300}
.lang-switcher{display:flex;gap:4px}
.lang-btn{padding:4px 10px;border-radius:3px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.5);transition:all .2s}
.lang-btn.active{background:#e8c87a;color:#000;border-color:#e8c87a;font-weight:700}
.btn{padding:7px 16px;border-radius:4px;font-size:12px;cursor:pointer;border:none;font-weight:600;transition:all .2s}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff}
.btn-outline:hover{border-color:#e8c87a;color:#e8c87a}
.btn-primary{background:#e8c87a;color:#0a0a0f}
.btn-primary:hover{background:#f0d68a}
.steps{display:flex;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;overflow-x:auto}
.step-tab{padding:10px 16px;font-size:10px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.4);letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.step-tab.active{color:#e8c87a;border-bottom-color:#e8c87a}
.step-tab.done{color:rgba(255,255,255,0.6)}
.step-num{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.1);font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-tab.active .step-num{background:#e8c87a;color:#000}
.step-tab.done .step-num{background:#4caf50;color:#fff}
.main{display:flex;flex:1;overflow:hidden}

/* VIEWPORT - přepínání 3D/2D */
.viewport-wrap{flex:1;position:relative;display:flex;flex-direction:column}
.view-toggle{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;background:rgba(0,0,0,0.6);border-radius:6px;overflow:hidden;z-index:20;backdrop-filter:blur(10px)}
.vtoggle-btn{padding:6px 16px;font-size:11px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.5);transition:all .2s}
.vtoggle-btn.active{background:#e8c87a;color:#0a0a0f;font-weight:700}
.view-3d{flex:1;position:relative}
.view-2d{flex:1;display:none;background:#111118;overflow:hidden;align-items:center;justify-content:center}
.view-2d.visible{display:flex}
canvas{width:100%;height:100%;display:block}
.loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f;gap:12px;z-index:10}
.spinner{width:40px;height:40px;border:3px solid rgba(232,200,122,0.2);border-top-color:#e8c87a;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.view-btns{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.vbtn{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:6px 12px;border-radius:3px;cursor:pointer;font-size:11px;backdrop-filter:blur(10px);transition:all .2s}
.vbtn:hover{border-color:#e8c87a;color:#e8c87a}

/* PANEL */
.panel{width:300px;background:rgba(255,255,255,0.03);border-left:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;overflow:hidden}
.panel-content{flex:1;overflow-y:auto;padding:14px}
.panel-content::-webkit-scrollbar{width:3px}
.panel-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1)}
.sec{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:10px;margin-top:14px}
.sec:first-child{margin-top:0}

.color-grid{display:flex;flex-wrap:wrap;gap:6px}
.swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
.swatch:hover{transform:scale(1.1)}
.swatch.active{border-color:#e8c87a;box-shadow:0 0 0 2px rgba(232,200,122,0.3)}
.sel-label{font-size:11px;color:rgba(255,255,255,0.5);margin-top:6px}

.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.opt-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:8px;cursor:pointer;transition:all .2s;text-align:center}
.opt-card:hover{border-color:rgba(232,200,122,0.4)}
.opt-card.active{border-color:#e8c87a;background:rgba(232,200,122,0.08)}
.opt-card .icon{font-size:20px;margin-bottom:3px}
.opt-card .name{font-size:11px;font-weight:600}
.opt-card .desc{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}
.opt-card .price{font-size:10px;color:#e8c87a;margin-top:3px}

.cur-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.cur-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:4px;cursor:pointer;transition:all .2s;font-size:11px}
.cur-item.active{border-color:#e8c87a;background:rgba(232,200,122,0.06)}

.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.lang-card{display:flex;align-items:center;gap:6px;padding:7px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:4px;cursor:pointer;transition:all .2s}
.lang-card.active{border-color:#e8c87a;background:rgba(232,200,122,0.06)}
.lang-card.primary{border-color:#4caf50;background:rgba(76,175,80,0.08)}
.lang-badge{font-size:9px;padding:1px 4px;border-radius:2px;margin-left:auto}
.badge-p{background:#4caf50;color:#fff}
.badge-s{background:#e8c87a;color:#000}

.mach-list{display:flex;flex-direction:column;gap:5px}
.mach-item{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:5px;cursor:pointer;transition:all .2s}
.mach-item:hover{border-color:rgba(232,200,122,0.3)}
.mach-item.active{border-color:#e8c87a;background:rgba(232,200,122,0.06)}
.mach-item .mi{font-size:18px;width:28px;text-align:center}
.mach-item .mn{font-size:11px;font-weight:600}
.mach-item .md{font-size:10px;color:rgba(255,255,255,0.4)}
.mach-item .mp{margin-left:auto;font-size:10px;color:#e8c87a;font-weight:600;white-space:nowrap}

/* STICKER CONFIG */
.stk-opts{display:flex;flex-direction:column;gap:6px}
.stk-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.stk-row label{font-size:10px;color:rgba(255,255,255,0.4);width:80px;flex-shrink:0}
.stk-select{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:4px 8px;border-radius:4px;font-size:11px}
.stk-select option{background:#1a1a2e}
.color-inp{width:32px;height:24px;border:1px solid rgba(255,255,255,0.2);border-radius:3px;cursor:pointer;padding:0}
.stk-text-inp{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:4px 8px;border-radius:4px;font-size:11px}
.stk-text-inp::placeholder{color:rgba(255,255,255,0.3)}

.mat-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.mat-tab{padding:4px 10px;border-radius:3px;font-size:10px;cursor:pointer;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.5);transition:all .2s}
.mat-tab.active{background:rgba(232,200,122,0.12);border-color:#e8c87a;color:#e8c87a}

.mesh-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.mesh-name{font-size:11px;color:rgba(255,255,255,0.6)}
.toggle{width:30px;height:17px;background:rgba(255,255,255,0.1);border-radius:9px;cursor:pointer;position:relative;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:#e8c87a}
.toggle::after{content:'';position:absolute;width:11px;height:11px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:16px}

.sum-panel{background:rgba(255,255,255,0.03);border-top:1px solid rgba(255,255,255,0.08);padding:10px 14px;flex-shrink:0}
.sum-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:rgba(255,255,255,0.5)}
.sum-row.total{color:#fff;font-weight:700;font-size:13px;border-top:1px solid rgba(255,255,255,0.1);margin-top:5px;padding-top:5px}
.pv{color:#e8c87a}
.nav-btns{display:flex;gap:8px;padding:10px 14px;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.nav-btns .btn{flex:1;text-align:center}
</style>
</head>
<body>
<header>
  <div class="logo">BS<span> konfigurátor</span></div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('cs')">CS</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('de')">DE</button>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="hdr-info" style="font-size:11px;color:rgba(255,255,255,0.3)"></span>
    <button class="btn btn-primary" onclick="showModal()">Uložit konfiguraci</button>
  </div>
</header>
<div class="steps" id="steps"></div>
<div class="main">
  <div class="viewport-wrap">
    <!-- Přepínač 3D/2D -->
    <div class="view-toggle">
      <button class="vtoggle-btn active" id="btn3d" onclick="switchView('3d')">3D model</button>
      <button class="vtoggle-btn" id="btn2d" onclick="switchView('2d')">2D náhled polepů</button>
    </div>
    <!-- 3D -->
    <div class="view-3d" id="view3d">
      <canvas id="canvas"></canvas>
      <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div id="ltxt" style="font-size:13px;color:rgba(255,255,255,0.4)">Načítám model...</div>
      </div>
      <div class="view-btns">
        <button class="vbtn" onclick="setView('front')">Přední</button>
        <button class="vbtn" onclick="setView('side')">Boční</button>
        <button class="vbtn" onclick="setView('top')">Shora</button>
        <button class="vbtn" onclick="setView('iso')">Izometrický</button>
      </div>
    </div>
    <!-- 2D vizualizace -->
    <div class="view-2d" id="view2d">
      <canvas id="canvas2d" style="max-width:700px;max-height:100%;width:100%"></canvas>
    </div>
  </div>
  <div class="panel">
    <div class="panel-content" id="panel-content"></div>
    <div class="sum-panel" id="sum-panel"></div>
    <div class="nav-btns">
      <button class="btn btn-outline" id="btn-prev" onclick="prevStep()">← Zpět</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextStep()">Další →</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center">
  <div style="background:#12121e;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:28px;max-width:460px;width:90%;max-height:80vh;overflow-y:auto">
    <h2 style="color:#e8c87a;margin-bottom:16px;font-size:17px">Souhrn konfigurace</h2>
    <div id="modal-content"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-outline" style="flex:1" onclick="document.getElementById('modal').style.display='none'">Zavřít</button>
      <button class="btn btn-primary" style="flex:1" onclick="dlConfig()">Stáhnout souhrn</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════ TRANSLATIONS ═══════════════
const TR={cs:{steps:['Barva & Materiál','Akceptory','Měna','Jazyk displeje','Typ stroje','Polepy','Souhrn'],mat_std:'Standardní',mat_mat:'Matný lak',mat_gloss:'Lesk',mat_metal:'Kov'},en:{steps:['Color & Material','Acceptors','Currency','Display Language','Machine Type','Stickers','Summary'],mat_std:'Standard',mat_mat:'Matte',mat_gloss:'Glossy',mat_metal:'Metal'},de:{steps:['Farbe & Material','Akzeptoren','Währung','Sprache','Maschinentyp','Aufkleber','Zusammenfassung'],mat_std:'Standard',mat_mat:'Matt',mat_gloss:'Hochglanz',mat_metal:'Metall'}};
let uiLang='cs';
const t=k=>(TR[uiLang]||TR.cs)[k]||k;
function setLang(l){uiLang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));renderStep();renderSum()}

// ═══════════════ DATA ═══════════════
const COLORS=[
  {n:{cs:'Bílá',en:'White',de:'Weiß'},h:'#f5f5f5',p:0},
  {n:{cs:'Světle šedá',en:'Light grey',de:'Hellgrau'},h:'#b0b8c1',p:0},
  {n:{cs:'Antracit',en:'Anthracite',de:'Anthrazit'},h:'#3a3d42',p:2000},
  {n:{cs:'Černá',en:'Black',de:'Schwarz'},h:'#1a1a1a',p:2000},
  {n:{cs:'Béžová',en:'Beige',de:'Beige'},h:'#d4c5a9',p:0},
  {n:{cs:'Zelená',en:'Green',de:'Grün'},h:'#4a7c59',p:3000},
  {n:{cs:'Modrá',en:'Blue',de:'Blau'},h:'#2c5f8a',p:3000},
  {n:{cs:'Červená',en:'Red',de:'Rot'},h:'#8a2c2c',p:3000},
  {n:{cs:'Zlatá',en:'Gold',de:'Gold'},h:'#c9a84c',p:5000},
  {n:{cs:'Stříbrná',en:'Silver',de:'Silber'},h:'#a8a8a8',p:3000},
];
const MATS=[{k:'std',p:0},{k:'mat',p:5000},{k:'gloss',p:8000},{k:'metal',p:12000}];
const ACCEPTORS=[
  {id:'coin',ic:'🪙',n:{cs:'Mincovník',en:'Coin acceptor',de:'Münzakzeptor'},d:{cs:'Přijímá mince',en:'Coins',de:'Münzen'},p:8000},
  {id:'bill',ic:'💵',n:{cs:'Bankomatník',en:'Bill acceptor',de:'Banknoten'},d:{cs:'Bankovky',en:'Banknotes',de:'Banknoten'},p:15000},
  {id:'card',ic:'💳',n:{cs:'Platební terminál',en:'Card terminal',de:'Kartenterminal'},d:{cs:'Platební karty',en:'Cards',de:'Karten'},p:12000},
  {id:'nfc',ic:'📱',n:{cs:'NFC / Mobil',en:'NFC / Mobile',de:'NFC'},d:{cs:'Bezkontaktní',en:'Contactless',de:'Kontaktlos'},p:6000},
  {id:'qr',ic:'📷',n:{cs:'QR platby',en:'QR payments',de:'QR-Zahlung'},d:{cs:'QR kód',en:'QR code',de:'QR-Code'},p:4000},
  {id:'crypto',ic:'₿',n:{cs:'Krypto',en:'Crypto',de:'Krypto'},d:{cs:'Kryptoměny',en:'Crypto',de:'Krypto'},p:18000},
];
const CURRENCIES=[
  {c:'CZK',f:'🇨🇿',n:'Koruna',s:'Kč',p:0},{c:'EUR',f:'🇪🇺',n:'Euro',s:'€',p:2000},
  {c:'USD',f:'🇺🇸',n:'Dollar',s:'$',p:2000},{c:'GBP',f:'🇬🇧',n:'Pound',s:'£',p:2000},
  {c:'CHF',f:'🇨🇭',n:'Franken',s:'CHF',p:2000},{c:'PLN',f:'🇵🇱',n:'Złoty',s:'zł',p:1000},
  {c:'HUF',f:'🇭🇺',n:'Forint',s:'Ft',p:1000},{c:'RON',f:'🇷🇴',n:'Leu',s:'lei',p:1000},
  {c:'SEK',f:'🇸🇪',n:'Krona',s:'kr',p:1000},{c:'NOK',f:'🇳🇴',n:'Krone',s:'kr',p:1000},
  {c:'DKK',f:'🇩🇰',n:'Krone',s:'kr',p:1000},{c:'HRK',f:'🇭🇷',n:'Kuna',s:'kn',p:1000},
];
const DLANGS=[
  {c:'cs',f:'🇨🇿',n:'Čeština'},{c:'sk',f:'🇸🇰',n:'Slovenčina'},
  {c:'en',f:'🇬🇧',n:'English'},{c:'de',f:'🇩🇪',n:'Deutsch'},
  {c:'pl',f:'🇵🇱',n:'Polski'},{c:'hu',f:'🇭🇺',n:'Magyar'},
  {c:'ro',f:'🇷🇴',n:'Română'},{c:'fr',f:'🇫🇷',n:'Français'},
  {c:'es',f:'🇪🇸',n:'Español'},{c:'it',f:'🇮🇹',n:'Italiano'},
  {c:'ru',f:'🇷🇺',n:'Русский'},{c:'ua',f:'🇺🇦',n:'Українська'},
];
const MACHINES=[
  {id:'laundry',ic:'👕',n:{cs:'Prádlomat',en:'Laundromat',de:'Waschsalon'},d:{cs:'Pračky a sušičky',en:'Washers & dryers',de:'Waschmaschinen'},p:0},
  {id:'cash',ic:'💰',n:{cs:'Výměna hotovosti',en:'Cash exchange',de:'Geldwechsel'},d:{cs:'Výměna měn',en:'Currency exchange',de:'Währung'},p:0},
  {id:'atm',ic:'🏧',n:{cs:'Bankomat (ATM)',en:'ATM',de:'Geldautomat'},d:{cs:'Výběr hotovosti',en:'Cash withdrawal',de:'Bargeld'},p:25000},
  {id:'topup',ic:'📲',n:{cs:'Dobíjení kreditu',en:'Top-up',de:'Aufladen'},d:{cs:'Mobil, MHD karty',en:'Mobile, transit',de:'Handy, Tickets'},p:10000},
  {id:'ticket',ic:'🎟️',n:{cs:'Prodej vstupenek',en:'Tickets',de:'Fahrkarten'},d:{cs:'Vstupenky, jízdenky',en:'Event tickets',de:'Eintrittskarten'},p:15000},
  {id:'pos',ic:'🛒',n:{cs:'POS Pokladna',en:'POS',de:'Kassensystem'},d:{cs:'Samoobslužná',en:'Self-checkout',de:'Selbstbedienung'},p:20000},
];

// ═══════════════ STATE ═══════════════
let step=0;
const BASE=45000;
let cfg={
  color:COLORS[0],mat:MATS[0],
  acceptors:new Set(['coin','card']),
  currencies:new Set(['CZK']),
  primaryLang:'cs',displayLangs:new Set(['cs','en']),
  machine:'laundry',
  // Sticker options
  stkLayout:'logo_top',
  stkAccent:'#3ab5c8',   // barva akcentů
  stkBody:'#d8d8d8',     // barva těla
  stkText:'PRÁDLOMAT',   // vlastní text
  stkFont:'Arial,sans-serif',
  stkShowBubbles:true,
  stkShowArrows:true,
  stkShowPrice:true,
  meshVis:{},
};
const price=()=>{
  let p=BASE+cfg.color.p+cfg.mat.p;
  cfg.acceptors.forEach(id=>{const a=ACCEPTORS.find(x=>x.id===id);if(a)p+=a.p});
  cfg.currencies.forEach(c=>{const x=CURRENCIES.find(y=>y.c===c);if(x)p+=x.p});
  p+=MACHINES.find(m=>m.id===cfg.machine)?.p||0;
  return p;
};

// ═══════════════ THREE.JS ═══════════════
const canvas=document.getElementById('canvas');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(devicePixelRatio);
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
renderer.shadowMap.enabled=true;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0d0d14);
const camera=new THREE.PerspectiveCamera(45,1,0.01,1000);
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const dl=new THREE.DirectionalLight(0xffffff,1.2);dl.position.set(5,10,5);dl.castShadow=true;scene.add(dl);
scene.add(Object.assign(new THREE.DirectionalLight(0x8ab4f8,0.4),{position:{set:()=>{}}}) );
const fl=new THREE.DirectionalLight(0x8ab4f8,.4);fl.position.set(-5,0,-5);scene.add(fl);
const rl=new THREE.DirectionalLight(0xe8c87a,.3);rl.position.set(0,-3,5);scene.add(rl);
const grid=new THREE.GridHelper(10,20,0x222233,0x111122);scene.add(grid);
let sph={theta:Math.PI/4,phi:Math.PI/3,radius:5};
let ct=new THREE.Vector3(),drag=false,pm={x:0,y:0};
canvas.addEventListener('mousedown',e=>{drag=true;pm={x:e.clientX,y:e.clientY}});
canvas.addEventListener('mouseup',()=>drag=false);
canvas.addEventListener('mousemove',e=>{if(!drag)return;sph.theta-=(e.clientX-pm.x)*.005;sph.phi=Math.max(.1,Math.min(Math.PI-.1,sph.phi+(e.clientY-pm.y)*.005));pm={x:e.clientX,y:e.clientY};ucam()});
canvas.addEventListener('wheel',e=>{sph.radius=Math.max(.5,Math.min(20,sph.radius+e.deltaY*.01));ucam()});
let lt=null;
canvas.addEventListener('touchstart',e=>{lt=e.touches[0]});
canvas.addEventListener('touchmove',e=>{if(!lt)return;const t=e.touches[0];sph.theta-=(t.clientX-lt.clientX)*.005;sph.phi=Math.max(.1,Math.min(Math.PI-.1,sph.phi+(t.clientY-lt.clientY)*.005));lt=t;ucam();e.preventDefault()},{passive:false});
function ucam(){camera.position.set(ct.x+sph.radius*Math.sin(sph.phi)*Math.sin(sph.theta),ct.y+sph.radius*Math.cos(sph.phi),ct.z+sph.radius*Math.sin(sph.phi)*Math.cos(sph.theta));camera.lookAt(ct)}
ucam();
function rsz(){const v=canvas.parentElement,w=v.clientWidth,h=v.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()}
window.addEventListener('resize',()=>{rsz();draw2D()});rsz();
let meshes=[],mats3d=[];
async function loadGLB(){
  try{const r=await fetch('BS-S-0204.glb');if(!r.ok)throw new Error('HTTP '+r.status);const buf=await r.arrayBuffer();document.getElementById('ltxt').textContent='Parsuju...';parseGLB(buf)}
  catch(e){document.getElementById('loading').innerHTML=`<div style="background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.3);border-radius:8px;padding:20px;text-align:center"><p style="color:#ff6b6b">⚠️ ${e.message}</p></div>`}
}
function parseGLB(buf){
  const dv=new DataView(buf);
  if(dv.getUint32(0,true)!==0x46546C67){throw new Error('Neplatný GLB')}
  const jl=dv.getUint32(12,true);
  const gltf=JSON.parse(new TextDecoder().decode(new Uint8Array(buf,20,jl)));
  buildScene(gltf,buf.slice(20+jl+8));
}
function getA(gltf,bin,i){const a=gltf.accessors[i],bv=gltf.bufferViews[a.bufferView];const off=(bv.byteOffset||0)+(a.byteOffset||0);const n={SCALAR:1,VEC2:2,VEC3:3,VEC4:4}[a.type]||1;const T2={5121:Uint8Array,5123:Uint16Array,5125:Uint32Array,5126:Float32Array}[a.componentType];return new T2(bin,off,a.count*n)}
function buildScene(gltf,bin){
  if(!gltf.meshes?.length)return;
  const grp=new THREE.Group();meshes=[];mats3d=[];
  gltf.meshes.forEach((mesh,mi)=>{
    const obj=new THREE.Group();obj.name=mesh.name||`Část ${mi+1}`;
    mesh.primitives.forEach(p=>{
      try{
        const geo=new THREE.BufferGeometry();
        if(p.attributes.POSITION!=null)geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(getA(gltf,bin,p.attributes.POSITION)),3));
        if(p.attributes.NORMAL!=null)geo.setAttribute('normal',new THREE.BufferAttribute(new Float32Array(getA(gltf,bin,p.attributes.NORMAL)),3));
        if(p.indices!=null)geo.setIndex(new THREE.BufferAttribute(new Uint32Array(getA(gltf,bin,p.indices)),1));
        if(!geo.attributes.normal)geo.computeVertexNormals();
        const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(cfg.color.h),roughness:.7,metalness:.1});
        mats3d.push(mat);obj.add(new THREE.Mesh(geo,mat));
      }catch(e){}
    });
    grp.add(obj);meshes.push(obj);cfg.meshVis[mi]=true;
  });
  const box=new THREE.Box3().setFromObject(grp);
  const ctr=box.getCenter(new THREE.Vector3()),sz=box.getSize(new THREE.Vector3());
  const sc=2.5/Math.max(sz.x,sz.y,sz.z);
  grp.scale.setScalar(sc);grp.position.sub(ctr.multiplyScalar(sc));
  const nb=new THREE.Box3().setFromObject(grp);
  grid.position.y=nb.min.y;ct.set(0,(nb.min.y+nb.max.y)/2,0);
  sph.radius=Math.max(sz.x,sz.y,sz.z)*sc*2.5;ucam();
  scene.add(grp);
  document.getElementById('loading').style.display='none';
  document.getElementById('hdr-info').textContent=`${meshes.length} součástí`;
  renderStep();renderSum();
}
function applyMat(){
  mats3d.forEach(m=>{
    m.color.set(cfg.color.h);
    const mp=cfg.mat.p;
    m.roughness=mp===0?.7:mp===5000?.9:mp===8000?.05:.3;
    m.metalness=mp===12000?.9:.1;m.needsUpdate=true;
  });
}
(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera)})();
loadGLB();

  roundRect(ctx2,58,98,105,334,3,true,false);

  roundRect(ctx2,66,110,88,125,3,true,false);

  ctx2.strokeStyle=ac;ctx2.lineWidth=2;

  ctx2.strokeStyle='#aaa';ctx2.lineWidth=1;
  ctx2.beginPath();ctx2.moveTo(330,100);ctx2.lineTo(330,428);ctx2.stroke();
  ctx2.beginPath();ctx2.moveTo(500,100);ctx2.lineTo(500,428);ctx2.stroke();

function drawMachine(ctx,x,y,w,h,label,kg,price,ac,bc,fnt,showArrows,showBubbles,isDryer){
  const cx=x+w/2,cy=y+h*.55;
  const r=Math.min(w*.42,80);

  // Panel pozadí
  ctx.fillStyle=bc==='#d8d8d8'?'#d4d4d4':lighten(bc,.9);
  roundRect(ctx,x,y,w,h,3,true,false);

  // Název
  ctx.fillStyle='#333';ctx.font=`bold 13px ${fnt}`;ctx.textAlign='center';
  ctx.fillText(label,cx,y+30);

  // Cena
  if(price){ctx.fillStyle=ac;ctx.font=`bold 12px ${fnt}`;ctx.fillText(price,cx,y+47);}

  // Šipky
  if(showArrows){
    ctx.fillStyle=ac;ctx.font='bold 16px Arial';
    ctx.fillText('∨',cx-20,y+63);ctx.fillText('∨',cx,y+63);ctx.fillText('∨',cx+18,y+63);
  }

  // Průzor - vnější kruh
  ctx.fillStyle='#888';ctx.strokeStyle='#666';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy,r+7,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Střední kruh
  ctx.fillStyle='#444';ctx.beginPath();ctx.arc(cx,cy,r+1,0,Math.PI*2);ctx.fill();
  // Sklo
  const glassGrad=ctx.createRadialGradient(cx-r*.25,cy-r*.25,0,cx,cy,r);
  glassGrad.addColorStop(0,isDryer?'rgba(180,100,50,.7)':'rgba(180,220,240,.7)');
  glassGrad.addColorStop(1,isDryer?'rgba(60,30,10,.6)':'rgba(40,100,140,.6)');
  ctx.fillStyle=glassGrad;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  // Vnitřek
  ctx.fillStyle=isDryer?'#2a1a0a':'#1a3a4a';
  ctx.beginPath();ctx.arc(cx,cy,r*.86,0,Math.PI*2);ctx.fill();
  // Obsah
  if(isDryer){
    ctx.fillStyle='rgba(255,120,50,.25)';
    ctx.beginPath();ctx.ellipse(cx,cy-r*.2,r*.4,r*.2,0,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle=`${ac}44`;
    ctx.beginPath();ctx.ellipse(cx,cy+r*.35,r*.5,r*.18,0,0,Math.PI*2);ctx.fill();
  }

  // Kg text
  ctx.fillStyle='#444';ctx.font=`bold 12px ${fnt}`;ctx.textAlign='center';
  ctx.fillText(kg,cx,y+h-55);

  // Bublinky
  if(showBubbles&&!isDryer){
    const by=y+h-35;
    [[cx-40,8,ac],[cx-22,5,'white'],[cx,10,ac],[cx+20,6,'white'],[cx+40,8,ac]].forEach(([bx,br,col])=>{
      ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.globalAlpha=.65;
      ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;
    });
  }

  // 18KG velký text pro sušičku
  if(isDryer&&w<180){
    ctx.fillStyle='rgba(80,80,80,.35)';ctx.font=`bold 38px ${fnt}`;
    ctx.fillText('18',x+w+20,cy+10);
    ctx.font=`bold 18px ${fnt}`;ctx.fillText('KG',x+w+18,cy+30);
  }

  ctx.textAlign='left';
}

function roundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
  if(fill)ctx.fill();if(stroke)ctx.stroke();
}
function darken(hex,f){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`}
function lighten(hex,f){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgb(${Math.min(255,Math.round(r+(255-r)*f))},${Math.min(255,Math.round(g+(255-g)*f))},${Math.min(255,Math.round(b+(255-b)*f))})`}

function switchView(v){
  const is3d=v==='3d';
  document.getElementById('view3d').style.display=is3d?'block':'none';
  document.getElementById('view2d').classList.toggle('visible',!is3d);
  document.getElementById('btn3d').classList.toggle('active',is3d);
  document.getElementById('btn2d').classList.toggle('active',!is3d);
  if(!is3d){draw2D();rsz2d();}
}
function rsz2d(){
  const v2=document.getElementById('view2d');
  c2.style.width=Math.min(v2.clientWidth,700)+'px';
}

function renderSteps(){
  document.getElementById('steps').innerHTML=t('steps').map((s,i)=>`<button class="step-tab ${i===step?'active':i<step?'done':''}" onclick="goStep(${i})"><span class="step-num">${i<step?'✓':i+1}</span>${s}</button>`).join('');
}
function renderStep(){
  renderSteps();
  const renders=[rColor,rAcceptors,rCurrency,rLangs,rMachine,rSticker,rSummaryStep];
  document.getElementById('panel-content').innerHTML=renders[step]?renders[step]():'';
  bindEvents();
}

}

function bindEvents(){
  document.querySelectorAll('[data-ci]').forEach(el=>el.addEventListener('click',()=>{cfg.color=COLORS[+el.dataset.ci];applyMat();renderStep();renderSum()}));
  document.querySelectorAll('[data-mi]').forEach(el=>el.addEventListener('click',()=>{cfg.mat=MATS[+el.dataset.mi];applyMat();renderStep();renderSum()}));
  document.querySelectorAll('[data-mesh]').forEach(el=>el.addEventListener('click',()=>{const i=+el.dataset.mesh;cfg.meshVis[i]=!cfg.meshVis[i];meshes[i].visible=cfg.meshVis[i];el.classList.toggle('on',cfg.meshVis[i])}));
  document.querySelectorAll('[data-acc]').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.acc;cfg.acceptors.has(id)?cfg.acceptors.delete(id):cfg.acceptors.add(id);renderStep();renderSum()}));
  document.querySelectorAll('[data-cur]').forEach(el=>el.addEventListener('click',()=>{const c=el.dataset.cur;cfg.currencies.has(c)?cfg.currencies.delete(c):cfg.currencies.add(c);renderStep();renderSum()}));
  document.querySelectorAll('[data-lang]').forEach(el=>{
    el.addEventListener('click',()=>{const c=el.dataset.lang;if(cfg.primaryLang===c)return;if(cfg.displayLangs.has(c)){if(cfg.displayLangs.size>1)cfg.displayLangs.delete(c);}else{if(cfg.displayLangs.size>=6){alert('Max 6!');return;}cfg.displayLangs.add(c);}renderStep();renderSum()});
    el.addEventListener('dblclick',()=>{const c=el.dataset.lang;cfg.primaryLang=c;cfg.displayLangs.add(c);renderStep();renderSum()});
  });
  document.querySelectorAll('[data-mach]').forEach(el=>el.addEventListener('click',()=>{cfg.machine=el.dataset.mach;renderStep();renderSum()}));

  // Sticker controls
  const sa=document.getElementById('s-accent');
  if(sa)sa.addEventListener('input',e=>{cfg.stkAccent=e.target.value;draw2D()});
  const sb=document.getElementById('s-body');
  if(sb)sb.addEventListener('input',e=>{cfg.stkBody=e.target.value;draw2D()});
  const st=document.getElementById('s-text');
  if(st)st.addEventListener('input',e=>{cfg.stkText=e.target.value;draw2D()});
  const sf=document.getElementById('s-font');
  if(sf)sf.addEventListener('change',e=>{cfg.stkFont=e.target.value;draw2D()});
  const sbub=document.getElementById('s-bubbles');
  if(sbub)sbub.addEventListener('click',()=>{cfg.stkShowBubbles=!cfg.stkShowBubbles;sbub.classList.toggle('on',cfg.stkShowBubbles);draw2D()});
  const sarr=document.getElementById('s-arrows');
  if(sarr)sarr.addEventListener('click',()=>{cfg.stkShowArrows=!cfg.stkShowArrows;sarr.classList.toggle('on',cfg.stkShowArrows);draw2D()});
  const spr=document.getElementById('s-price');
  if(spr)spr.addEventListener('click',()=>{cfg.stkShowPrice=!cfg.stkShowPrice;spr.classList.toggle('on',cfg.stkShowPrice);draw2D()});
}

function renderSum(){
  const p=price();
  document.getElementById('sum-panel').innerHTML=`
    <div class="sum-row"><span>Základní cena</span><span class="pv">${BASE.toLocaleString()} Kč</span></div>
    ${cfg.color.p>0?`<div class="sum-row"><span>${cfg.color.n[uiLang]||cfg.color.n.cs}</span><span class="pv">+${cfg.color.p.toLocaleString()} Kč</span></div>`:''}
    ${cfg.mat.p>0?`<div class="sum-row"><span>${t('mat_'+cfg.mat.k)}</span><span class="pv">+${cfg.mat.p.toLocaleString()} Kč</span></div>`:''}
    <div class="sum-row total"><span>Celkem</span><span class="pv">${p.toLocaleString()} Kč</span></div>`;
}

function goStep(s){step=s;renderStep();renderSum();updNav();if(s!==5)switchView('3d')}
function nextStep(){if(step<6){step++;renderStep();renderSum();updNav()}}
function prevStep(){if(step>0){step--;renderStep();renderSum();updNav();if(step!==5)switchView('3d')}}
function updNav(){
  document.getElementById('btn-prev').style.display=step===0?'none':'block';
  const nb=document.getElementById('btn-next');
  nb.textContent=step===6?'Uložit':'Další →';
  nb.onclick=step===6?showModal:nextStep;
}

function setView(v){
  const views={front:[Math.PI,Math.PI/2],side:[Math.PI/2,Math.PI/2],top:[Math.PI/4,.15],iso:[Math.PI/4,Math.PI/3]};
  [sph.theta,sph.phi]=views[v];ucam();
}

function showModal(){
  const p=price();
  const mrow=(k,v,pr)=>`<tr style="border-bottom:1px solid rgba(255,255,255,.05)"><td style="padding:7px 0;color:rgba(255,255,255,.4);width:100px;font-size:12px">${k}</td><td style="font-size:12px;color:#fff">${v||'—'}</td><td style="color:#e8c87a;text-align:right;font-size:11px">${pr>0?'+'+pr.toLocaleString()+' Kč':''}</td></tr>`;
  document.getElementById('modal-content').innerHTML=`
    <table style="width:100%;border-collapse:collapse;margin-bottom:14px">
      ${mrow('Barva',cfg.color.n[uiLang]||cfg.color.n.cs,cfg.color.p)}
      ${mrow('Materiál',t('mat_'+cfg.mat.k),cfg.mat.p)}
      ${mrow('Akceptory',[...cfg.acceptors].join(', '),[...cfg.acceptors].reduce((s,id)=>{const a=ACCEPTORS.find(x=>x.id===id);return s+(a?.p||0)},0))}
      ${mrow('Měna',[...cfg.currencies].join(', '),0)}
      ${mrow('Jazyky',[...cfg.displayLangs].join(', '),0)}
      ${mrow('Stroj',MACHINES.find(m=>m.id===cfg.machine)?.n[uiLang],MACHINES.find(m=>m.id===cfg.machine)?.p||0)}
      ${mrow('Logo',cfg.stkText,0)}
      ${mrow('Akcent',cfg.stkAccent,0)}
    </table>
    <div style="background:rgba(232,200,122,.1);border:1px solid rgba(232,200,122,.3);border-radius:8px;padding:14px;text-align:center">
      <div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:5px">CELKOVÁ CENA</div>
      <div style="font-size:26px;font-weight:700;color:#e8c87a">${p.toLocaleString()} Kč</div>
      <div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:3px">bez DPH</div>
    </div>`;
  document.getElementById('modal').style.display='flex';
}

function dlConfig(){
  const p=price();
  const txt=`BS KONFIGURÁTOR - SOUHRN\n${'='.repeat(40)}\nDatum: ${new Date().toLocaleDateString('cs-CZ')}\n\nBarva: ${cfg.color.n.cs}\nMateriál: ${t('mat_'+cfg.mat.k)}\nAkceptory: ${[...cfg.acceptors].join(', ')}\nMěna: ${[...cfg.currencies].join(', ')}\nJazyky: ${[...cfg.displayLangs].join(', ')}\nTyp stroje: ${cfg.machine}\nLogo text: ${cfg.stkText}\nBarva akcentu: ${cfg.stkAccent}\n\nCELKOVÁ CENA: ${p.toLocaleString()} Kč (bez DPH)`;
  const a=document.createElement('a');a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);a.download='konfigurace-BS.txt';a.click();
}

// INIT
renderStep();renderSum();updNav();
</script>
</body>
</html>
