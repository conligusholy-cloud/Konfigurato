<!DOCTYPE html>
<html lang="cs">

<title>BS Konfigurátor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a0f;color:#fff;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08);z-index:100;flex-shrink:0}
.logo{font-size:16px;font-weight:700;letter-spacing:2px;color:#e8c87a}
.logo span{color:#fff;font-weight:300}
.lang-switcher{display:flex;gap:4px}
.lang-btn{padding:4px 10px;border-radius:3px;font-size:11px;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,0.5);transition:all .2s}
.lang-btn.active{background:#e8c87a;color:#000;border-color:#e8c87a;font-weight:700}
.btn{padding:7px 16px;border-radius:4px;font-size:12px;cursor:pointer;border:none;font-weight:600;letter-spacing:.5px;transition:all .2s}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.3);color:#fff}
.btn-outline:hover{border-color:#e8c87a;color:#e8c87a}
.btn-primary{background:#e8c87a;color:#0a0a0f}
.btn-primary:hover{background:#f0d68a}

/* STEP TABS */
.steps{display:flex;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;overflow-x:auto}
.step-tab{padding:10px 18px;font-size:11px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.4);letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.step-tab.active{color:#e8c87a;border-bottom-color:#e8c87a}
.step-tab.done{color:rgba(255,255,255,0.6)}
.step-num{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.1);font-size:10px;display:flex;align-items:center;justify-content:center}
.step-tab.active .step-num{background:#e8c87a;color:#000}
.step-tab.done .step-num{background:#4caf50;color:#fff}

/* MAIN */
.main{display:flex;flex:1;overflow:hidden}
.viewport{flex:1;position:relative}
canvas{width:100%;height:100%;display:block}

.loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f;gap:12px;z-index:10}
.spinner{width:40px;height:40px;border:3px solid rgba(232,200,122,0.2);border-top-color:#e8c87a;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.view-btns{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.vbtn{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:6px 12px;border-radius:3px;cursor:pointer;font-size:11px;backdrop-filter:blur(10px);transition:all .2s}
.vbtn:hover{border-color:#e8c87a;color:#e8c87a}

/* PANEL */
.panel{width:320px;background:rgba(255,255,255,0.03);border-left:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;overflow:hidden}
.panel-content{flex:1;overflow-y:auto;padding:16px}
.panel-content::-webkit-scrollbar{width:3px}
.panel-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

.section-title{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:12px;margin-top:16px}
.section-title:first-child{margin-top:0}

/* COLOR */
.color-grid{display:flex;flex-wrap:wrap;gap:6px}
.swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
.swatch:hover{transform:scale(1.1)}
.swatch.active{border-color:#e8c87a;box-shadow:0 0 0 2px rgba(232,200,122,0.3)}
.sel-label{font-size:11px;color:rgba(255,255,255,0.5);margin-top:6px}

/* OPTION CARDS */
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:10px;cursor:pointer;transition:all .2s;text-align:center}
.opt-card:hover{border-color:rgba(232,200,122,0.4)}
.opt-card.active{border-color:#e8c87a;background:rgba(232,200,122,0.08)}
.opt-card .icon{font-size:22px;margin-bottom:4px}
.opt-card .name{font-size:11px;color:rgba(255,255,255,0.8);font-weight:600}
.opt-card .desc{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;line-height:1.3}
.opt-card .price{font-size:10px;color:#e8c87a;margin-top:4px}

/* CURRENCY CHECKBOXES */
.currency-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.currency-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:5px;cursor:pointer;transition:all .2s}
.currency-item.active{border-color:#e8c87a;background:rgba(232,200,122,0.06)}
.currency-item .flag{font-size:16px}
.currency-item .cname{font-size:11px;color:rgba(255,255,255,0.7)}
.currency-item .csym{font-size:10px;color:rgba(255,255,255,0.4)}

/* MACHINE */
.machine-list{display:flex;flex-direction:column;gap:6px}
.machine-item{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;cursor:pointer;transition:all .2s}
.machine-item:hover{border-color:rgba(232,200,122,0.3)}
.machine-item.active{border-color:#e8c87a;background:rgba(232,200,122,0.06)}
.machine-item .micon{font-size:20px;width:32px;text-align:center}
.machine-item .minfo .mname{font-size:12px;font-weight:600}
.machine-item .minfo .mdesc{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}
.machine-item .mprice{margin-left:auto;font-size:11px;color:#e8c87a;font-weight:600}

/* STICKER */
.sticker-zone{background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.15);border-radius:8px;padding:16px;text-align:center;min-height:120px;position:relative;overflow:hidden}
.sticker-preview{width:100%;height:80px;border-radius:4px;object-fit:cover;margin-bottom:8px}
.sticker-opts{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.sticker-row{display:flex;gap:6px;align-items:center}
.sticker-row label{font-size:10px;color:rgba(255,255,255,0.4);width:70px;flex-shrink:0}
.sticker-select{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer}
.sticker-select option{background:#1a1a2e}
.color-input{width:32px;height:24px;border:none;border-radius:3px;cursor:pointer;padding:0}

/* SUMMARY */
.summary-panel{background:rgba(255,255,255,0.03);border-top:1px solid rgba(255,255,255,0.08);padding:12px 16px;flex-shrink:0}
.sum-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;color:rgba(255,255,255,0.5)}
.sum-row.total{color:#fff;font-weight:700;font-size:13px;border-top:1px solid rgba(255,255,255,0.1);margin-top:6px;padding-top:6px}
.price-val{color:#e8c87a}

/* MESH TOGGLES */
.mesh-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.mesh-name{font-size:11px;color:rgba(255,255,255,0.6)}
.toggle{width:32px;height:18px;background:rgba(255,255,255,0.1);border-radius:9px;cursor:pointer;position:relative;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:#e8c87a}
.toggle::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:17px}

/* LANG STEP */
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.lang-card{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:5px;cursor:pointer;transition:all .2s}
.lang-card.active{border-color:#e8c87a;background:rgba(232,200,122,0.06)}
.lang-card.primary-lang{border-color:#4caf50;background:rgba(76,175,80,0.08)}
.lang-flag{font-size:18px}
.lang-name{font-size:11px;color:rgba(255,255,255,0.7)}
.lang-badge{font-size:9px;padding:1px 5px;border-radius:3px;margin-left:auto}
.badge-primary{background:#4caf50;color:#fff}
.badge-selected{background:#e8c87a;color:#000}

.mat-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.mat-tab{padding:5px 10px;border-radius:3px;font-size:10px;cursor:pointer;border:1px solid rgba(255,255,255,0.12);background:transparent;color:rgba(255,255,255,0.5);transition:all .2s}
.mat-tab.active{background:rgba(232,200,122,0.12);border-color:#e8c87a;color:#e8c87a}

.nav-btns{display:flex;gap:8px;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.nav-btns .btn{flex:1;text-align:center}
</style>

<header>
  <div class="logo">BS<span> konfigurátor</span></div>
  <div class="lang-switcher" id="ui-lang-switcher">
    <button class="lang-btn active" onclick="setUILang('cs')">CS</button>
    <button class="lang-btn" onclick="setUILang('en')">EN</button>
    <button class="lang-btn" onclick="setUILang('de')">DE</button>
  </div>
  <div style="display:flex;gap:8px">
    <span id="hdr-info" style="font-size:11px;color:rgba(255,255,255,0.35);line-height:2"></span>
    <button class="btn btn-primary" onclick="showSummaryModal()" data-t="save">Uložit konfiguraci</button>
  </div>
</header>

<div class="steps" id="steps"></div>

<div class="main">
  <div class="viewport">
    <canvas id="canvas"></canvas>
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div id="loading-text" style="font-size:13px;color:rgba(255,255,255,0.4)">Načítám model...</div>
    </div>
    <div class="view-btns">
      <button class="vbtn" onclick="setView('front')" data-t="front">Přední</button>
      <button class="vbtn" onclick="setView('side')" data-t="side">Boční</button>
      <button class="vbtn" onclick="setView('top')" data-t="top">Shora</button>
      <button class="vbtn" onclick="setView('iso')" data-t="iso">Izometrický</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-content" id="panel-content"></div>
    <div class="summary-panel" id="summary-panel"></div>
    <div class="nav-btns">
      <button class="btn btn-outline" id="btn-prev" onclick="prevStep()" data-t="prev">← Zpět</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextStep()" data-t="next">Další →</button>
    </div>
  </div>
</div>

<!-- SUMMARY MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center">
  <div style="background:#12121e;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:32px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto">
    <h2 style="color:#e8c87a;margin-bottom:20px;font-size:18px" data-t="config_sum">Souhrn konfigurace</h2>
    <div id="modal-content"></div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn btn-outline" style="flex:1" onclick="document.getElementById('modal').style.display='none'" data-t="close">Zavřít</button>
      <button class="btn btn-primary" style="flex:1" onclick="downloadConfig()" data-t="download">Stáhnout PDF</button>
    </div>
  </div>
</div>

const BASE = 45000;

function calcPrice(){
  let p = BASE;
  p += cfg.color.price;
  p += cfg.mat.price;
  cfg.acceptors.forEach(id=>{ const a=ACCEPTORS.find(x=>x.id===id); if(a) p+=a.price; });
  cfg.currencies.forEach(c=>{ const x=CURRENCIES.find(y=>y.code===c); if(x) p+=x.price; });
  p += MACHINES.find(m=>m.id===cfg.machine)?.price||0;
  p += cfg.sticker.price;
  return p;
}

const canvas = document.getElementById('canvas');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d14);
const camera = new THREE.PerspectiveCamera(45,1,0.01,1000);

scene.add(new THREE.AmbientLight(0xffffff,0.6));

let sph={theta:Math.PI/4,phi:Math.PI/3,radius:5};
let camTarget=new THREE.Vector3();
let drag=false, pm={x:0,y:0};
canvas.addEventListener('mousedown',e=>{drag=true;pm={x:e.clientX,y:e.clientY}});
canvas.addEventListener('mouseup',()=>drag=false);
canvas.addEventListener('mousemove',e=>{if(!drag)return;sph.theta-=(e.clientX-pm.x)*0.005;sph.phi=Math.max(0.1,Math.min(Math.PI-0.1,sph.phi+(e.clientY-pm.y)*0.005));pm={x:e.clientX,y:e.clientY};updateCam()});
canvas.addEventListener('wheel',e=>{sph.radius=Math.max(0.5,Math.min(20,sph.radius+e.deltaY*0.01));updateCam()});
let lt2=null;
canvas.addEventListener('touchstart',e=>{lt2=e.touches[0]});
canvas.addEventListener('touchmove',e=>{if(!lt2)return;const t=e.touches[0];sph.theta-=(t.clientX-lt2.clientX)*0.005;sph.phi=Math.max(0.1,Math.min(Math.PI-0.1,sph.phi+(t.clientY-lt2.clientY)*0.005));lt2=t;updateCam();e.preventDefault()},{passive:false});

function updateCam(){
  camera.position.set(camTarget.x+sph.radius*Math.sin(sph.phi)*Math.sin(sph.theta),camTarget.y+sph.radius*Math.cos(sph.phi),camTarget.z+sph.radius*Math.sin(sph.phi)*Math.cos(sph.theta));
  camera.lookAt(camTarget);
}
updateCam();

function resize(){const vp=canvas.parentElement,w=vp.clientWidth,h=vp.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()}
window.addEventListener('resize',resize);resize();

let meshes=[],mats=[];
async function loadGLB(){
  try{
    const r=await fetch('BS-S-0204.glb');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const buf=await r.arrayBuffer();
    document.getElementById('loading-text').textContent='Parsuju model...';
    parseGLB(buf);
  }catch(e){document.getElementById('loading').innerHTML=`<div style="background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);border-radius:8px;padding:20px;text-align:center;max-width:320px"><p style="color:#ff6b6b;margin-bottom:8px">⚠️ Chyba načítání</p><p style="font-size:12px;color:rgba(255,255,255,0.5)">${e.message}</p></div>`}
}
function parseGLB(buf){
  const dv=new DataView(buf);
  if(dv.getUint32(0,true)!==0x46546C67){throw new Error('Neplatný GLB')}
  const jl=dv.getUint32(12,true);
  const gltf=JSON.parse(new TextDecoder().decode(new Uint8Array(buf,20,jl)));
  const bin=buf.slice(20+jl+8);
  buildScene(gltf,bin);
}
function getAcc(gltf,bin,i){
  const a=gltf.accessors[i],bv=gltf.bufferViews[a.bufferView];
  const off=(bv.byteOffset||0)+(a.byteOffset||0);
  const n={SCALAR:1,VEC2:2,VEC3:3,VEC4:4}[a.type]||1;
  const T2={5121:Uint8Array,5123:Uint16Array,5125:Uint32Array,5126:Float32Array}[a.componentType];
  return new T2(bin,off,a.count*n);
}
function buildScene(gltf,bin){
  if(!gltf.meshes?.length)return;
  const grp=new THREE.Group();
  meshes=[];mats=[];
  gltf.meshes.forEach((mesh,mi)=>{
    const obj=new THREE.Group();obj.name=mesh.name||`Část ${mi+1}`;
    mesh.primitives.forEach(p=>{
      try{
        const geo=new THREE.BufferGeometry();
        if(p.attributes.POSITION!=null)geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(getAcc(gltf,bin,p.attributes.POSITION)),3));
        if(p.attributes.NORMAL!=null)geo.setAttribute('normal',new THREE.BufferAttribute(new Float32Array(getAcc(gltf,bin,p.attributes.NORMAL)),3));
        if(p.indices!=null)geo.setIndex(new THREE.BufferAttribute(new Uint32Array(getAcc(gltf,bin,p.indices)),1));
        if(!geo.attributes.normal)geo.computeVertexNormals();
        const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(cfg.color.hex),roughness:cfg.mat.price===0?0.7:cfg.mat.price===5000?0.9:cfg.mat.price===8000?0.1:0.3,metalness:cfg.mat.price===12000?0.9:0.1});
        mats.push(mat);
        const m=new THREE.Mesh(geo,mat);m.castShadow=true;m.receiveShadow=true;obj.add(m);
      }catch(e){}
    });
    grp.add(obj);meshes.push(obj);cfg.meshVis[mi]=true;
  });
  const box=new THREE.Box3().setFromObject(grp);
  const ctr=box.getCenter(new THREE.Vector3());
  const sz=box.getSize(new THREE.Vector3());
  const sc=2.5/Math.max(sz.x,sz.y,sz.z);
  grp.scale.setScalar(sc);grp.position.sub(ctr.multiplyScalar(sc));
  const nb=new THREE.Box3().setFromObject(grp);
  grid.position.y=nb.min.y;camTarget.set(0,(nb.min.y+nb.max.y)/2,0);
  sph.radius=Math.max(sz.x,sz.y,sz.z)*sc*2.5;updateCam();
  scene.add(grp);
  document.getElementById('loading').style.display='none';
  document.getElementById('hdr-info').textContent=`${meshes.length} součástí`;
  renderStep();renderSummary();
}
function applyMat(){
  mats.forEach(m=>{
    m.color.set(cfg.color.hex);
    const mp=cfg.mat.price;
    m.roughness=mp===0?0.7:mp===5000?0.9:mp===8000?0.1:0.3;
    m.metalness=mp===12000?0.9:0.1;
    m.needsUpdate=true;
  });
}

(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera)})();
loadGLB();

      <span class="step-num">${i<step?'✓':i+1}</span>${s}

  renderSteps();
  const p=document.getElementById('panel-content');
  const steps=[renderColor,renderAcceptors,renderCurrency,renderLangs,renderMachine,renderSticker,renderSummaryStep];
  p.innerHTML=steps[step]?steps[step]():'';
  bindStepEvents();
}

function row(k,v){return `<tr><td style="padding:5px 0;color:rgba(255,255,255,0.4);width:90px">${k}</td><td style="color:#fff">${v}</td></tr>`;}

function bindStepEvents(){
  // Color swatches
  document.querySelectorAll('[data-ci]').forEach(el=>el.addEventListener('click',()=>{
    cfg.color=COLORS[+el.dataset.ci];applyMat();renderStep();renderSummary();
  }));
  // Mat tabs
  document.querySelectorAll('[data-mi]').forEach(el=>el.addEventListener('click',()=>{
    cfg.mat=MATS[+el.dataset.mi];applyMat();renderStep();renderSummary();
  }));
  // Mesh toggles
  document.querySelectorAll('[data-mesh]').forEach(el=>el.addEventListener('click',()=>{
    const i=+el.dataset.mesh;cfg.meshVis[i]=!cfg.meshVis[i];meshes[i].visible=cfg.meshVis[i];el.classList.toggle('on',cfg.meshVis[i]);
  }));
  // Acceptors
  document.querySelectorAll('[data-acc]').forEach(el=>el.addEventListener('click',()=>{
    const id=el.dataset.acc;cfg.acceptors.has(id)?cfg.acceptors.delete(id):cfg.acceptors.add(id);renderStep();renderSummary();
  }));
  // Currency
  document.querySelectorAll('[data-cur]').forEach(el=>el.addEventListener('click',()=>{
    const c=el.dataset.cur;cfg.currencies.has(c)?cfg.currencies.delete(c):cfg.currencies.add(c);renderStep();renderSummary();
  }));
  // Display langs
  document.querySelectorAll('[data-lang]').forEach(el=>el.addEventListener('click',()=>{
    const c=el.dataset.lang;
    if(cfg.primaryLang===c)return; // can't deselect primary
    if(cfg.displayLangs.has(c)){
      if(cfg.displayLangs.size>1)cfg.displayLangs.delete(c);
    } else {
      if(cfg.displayLangs.size>=6){alert('Maximálně 6 jazyků!');return;}
      cfg.displayLangs.add(c);
    }
    // double click = set primary
    el.addEventListener('dblclick',()=>{cfg.primaryLang=c;cfg.displayLangs.add(c);renderStep();},{once:true});
    renderStep();renderSummary();
  }));
  // Machine
  document.querySelectorAll('[data-mach]').forEach(el=>el.addEventListener('click',()=>{cfg.machine=el.dataset.mach;renderStep();renderSummary()}));
  // Stickers
  document.querySelectorAll('[data-stk]').forEach(el=>el.addEventListener('click',()=>{cfg.sticker=STICKER_LAYOUTS.find(s=>s.id===el.dataset.stk);renderStep();renderSummary()}));
  // Sticker colors
  const sc1=document.getElementById('sc1');
  if(sc1)sc1.addEventListener('input',e=>{cfg.stickerColor1=e.target.value;const box=document.getElementById('sticker-preview-box');if(box)box.style.background=`linear-gradient(135deg,${cfg.stickerColor1},${cfg.stickerColor2})`;});
  const sc2=document.getElementById('sc2');
  if(sc2)sc2.addEventListener('input',e=>{cfg.stickerColor2=e.target.value;const box=document.getElementById('sticker-preview-box');if(box)box.style.background=`linear-gradient(135deg,${cfg.stickerColor1},${cfg.stickerColor2})`;});
  const sf=document.getElementById('sfont');
  if(sf)sf.addEventListener('change',e=>{cfg.stickerFont=e.target.value;const box=document.getElementById('sticker-preview-box');if(box)box.style.fontFamily=cfg.stickerFont;});
}

    ${cfg.color.price>0?`<div class="sum-row"><span>${cfg.color.name[uiLang]||cfg.color.name.cs}</span><span class="price-val">+${cfg.color.price.toLocaleString()} Kč</span></div>`:''}

    <div class="sum-row total"><span>${t('total')}</span><span class="price-val">${price.toLocaleString()} Kč</span></div>`;
}

// NAVIGATION
// ═══════════════════════════════════════════════
function goStep(s){step=s;renderStep();renderSummary();updateNavBtns()}
function nextStep(){if(step<STEPS-1){step++;renderStep();renderSummary();updateNavBtns()}}
function prevStep(){if(step>0){step--;renderStep();renderSummary();updateNavBtns()}}
function updateNavBtns(){
  document.getElementById('btn-prev').style.display=step===0?'none':'block';
  document.getElementById('btn-next').textContent=step===STEPS-1?t('save'):t('next');
  document.getElementById('btn-next').onclick=step===STEPS-1?showSummaryModal:nextStep;
}

function setView(v){
  const views={front:[Math.PI,Math.PI/2],side:[Math.PI/2,Math.PI/2],top:[Math.PI/4,0.15],iso:[Math.PI/4,Math.PI/3]};
  [sph.theta,sph.phi]=views[v];updateCam();
}
function resetCamera(){sph.theta=Math.PI/4;sph.phi=Math.PI/3;updateCam()}

      <div style="font-size:28px;font-weight:700;color:#e8c87a">${price.toLocaleString()} Kč</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px">bez DPH</div>
    </div>`;
  document.getElementById('modal').style.display='flex';
}
function mrow(k,v,p){return `<tr style="border-bottom:1px solid rgba(255,255,255,0.05)"><td style="padding:8px 0;color:rgba(255,255,255,0.4);width:110px">${k}</td><td style="color:#fff">${v||'—'}</td><td style="color:#e8c87a;text-align:right">${p>0?'+'+p.toLocaleString()+' Kč':''}</td></tr>`}

function downloadConfig(){
  const price=calcPrice();
  const txt=`BS KONFIGURÁTOR - SOUHRN\n${'='.repeat(40)}\nDatum: ${new Date().toLocaleDateString('cs-CZ')}\n\nBarva: ${cfg.color.name[uiLang]||cfg.color.name.cs}\nMateriál: ${t('mat_'+cfg.mat.key)}\nAkceptory: ${[...cfg.acceptors].join(', ')}\nMěna: ${[...cfg.currencies].join(', ')}\nJazyky: ${[...cfg.displayLangs].join(', ')}\nTyp stroje: ${cfg.machine}\nPolep: ${cfg.sticker.name[uiLang]||cfg.sticker.name.cs}\n\nCELKOVÁ CENA: ${price.toLocaleString()} Kč (bez DPH)`;
  const a=document.createElement('a');a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);a.download='konfigurace-BS.txt';a.click();
}

// Init
renderStep();renderSummary();updateNavBtns();
</script>
