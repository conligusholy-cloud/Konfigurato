<!-- 1) Ve <head> nebo před </body> přidej GLTFLoader PŘED stávající three.js script tag -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<!-- 2) Nahraď celou funkci loadGLB() a parseGLB() tímto: -->

<script>
async function loadGLB() {
  const loader = new THREE.GLTFLoader();
  
  loader.load(
    'BS-S-0204.glb',
    
    // ✅ Úspěch
    function(gltf) {
      const model = gltf.scene;
      meshes = [];
      mats3d = [];
      
      // Projdi všechny meshe v modelu
      model.traverse(function(child) {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          
          // Ulož materiál pro pozdější přebarvení
          if (Array.isArray(child.material)) {
            child.material.forEach(m => mats3d.push(m));
          } else {
            mats3d.push(child.material);
          }
          
          meshes.push(child);
          cfg.meshVis[meshes.length - 1] = true;
        }
      });
      
      // Vystředění a scale modelu
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 2.5 / maxDim;
      
      model.scale.setScalar(scale);
      model.position.sub(center.multiplyScalar(scale));
      
      // Nastav grid pod model
      const newBox = new THREE.Box3().setFromObject(model);
      grid.position.y = newBox.min.y;
      ct.set(0, (newBox.min.y + newBox.max.y) / 2, 0);
      sph.radius = maxDim * scale * 2.2;
      ucam();
      
      scene.add(model);
      
      // Skryj loading overlay
      document.getElementById('loading').style.display = 'none';
      document.getElementById('hdr-info').textContent = meshes.length + ' součástí';
      
      renderStep();
      renderSum();
    },
    
    // 📊 Progress
    function(xhr) {
      if (xhr.total > 0) {
        const pct = Math.round((xhr.loaded / xhr.total) * 100);
        document.getElementById('ltxt').textContent = 'Načítám model... ' + pct + '%';
      }
    },
    
    // ❌ Chyba
    function(error) {
      console.error('GLB chyba:', error);
      document.getElementById('loading').innerHTML = `
        <div style="background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.3);
                    border-radius:8px;padding:20px;text-align:center;max-width:300px">
          <p style="color:#ff6b6b;font-size:14px;margin-bottom:8px">⚠️ Model se nepodařilo načíst</p>
          <p style="color:rgba(255,255,255,.4);font-size:11px">${error.message || 'Zkontroluj konzoli (F12)'}</p>
        </div>`;
    }
  );
}

// Smaž původní funkci parseGLB — už ji nepotřebuješ
// function parseGLB(buf) { ... }  ← SMAŽ CELOU
// function getA(gltf,bin,i) { ... }  ← SMAŽ CELOU
// function buildScene(gltf,bin) { ... }  ← SMAŽ CELOU

// Funkce applyMat zůstává stejná, jen přidej fallback pro případ že materiál není MeshStandardMaterial
function applyMat() {
  mats3d.forEach(m => {
    if (!m) return;
    // Nastav barvu — funguje pro Standard i Phong materiály
    if (m.color) m.color.set(cfg.color.h);
    
    const mp = cfg.mat.p;
    if (m.roughness !== undefined) {
      m.roughness = mp === 0 ? 0.7 : mp === 5000 ? 0.9 : mp === 8000 ? 0.05 : 0.3;
      m.metalness = mp === 12000 ? 0.9 : 0.1;
    }
    m.needsUpdate = true;
  });
}
</script>
